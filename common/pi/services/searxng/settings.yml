use_default_settings: true

general:
  instance_name: "SearXNG (pi research)"

search:
  formats:
    - html
    - json

server:
  secret_key: "searxng-pi-research-key"
  bind_address: "0.0.0.0"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0

# Override default engines: keep only what we need for pi research
engines:
  - name: duckduckgo
    disabled: false

  - name: wikipedia
    disabled: false
