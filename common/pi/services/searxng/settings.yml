use_standard_size: true
general:
  instance_name: "SearXNG (pi research)"
  debug: false
  privacypolicy_url: false
  donation_url: false

search:
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "searxng-pi-research-key"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  useragent_suffix: ""

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackexchange
    shortcut: so
    api_url: https://api.stackexchange.com/2.3/
    disabled: false
