# --- Prefix Key ---
set -g prefix C-Space

# Custom keybindings (centralized: descriptions feed prefix+? popup)
source-file ~/.config/tmux/custom-keys.conf

# --- General ---
# default-command: do NOT bake $SHELL at config-load time. rcon's ssh-t
# evaluates the inline script in bash (login shell from /etc/passwd is
# bash on no-sudo hosts), so ${SHELL}=bash gets frozen for the server's
# lifetime and new panes open bash. Use a runtime resolver: at pane spawn,
# default-shell -c will run this string, command -v zsh finds whatever
# zsh is in PATH at that moment (PATH was set via .zshenv / rcon).
set -g default-command 'exec "$(command -v zsh 2>/dev/null || echo /bin/bash)"'
set -g mouse on
set -g set-clipboard on  # OSC52 clipboard (SSH経由でもコピー可能)
set -g focus-events on   # Neovim autoread等に必要
# window のサイズは最後にアクティブだったクライアントに合わせる。
# 注: 以前 smallest を試したが重大な副作用があり撤回した。smallest は「最小の attach
# クライアント」に追従するため、client のサイズ/接続が変わる度に window サイズを再計算する。
# tmux は window サイズが再計算されると zoom を解除する仕様のため、agent が tmux-mcp 等で
# サーバに触れて一時的な制御クライアントが瞬間 attach/detach する度に、zoom 中 (prefix-z) や
# choose-tree 中 (prefix-s は -Z でズーム) の window が unzoom され、操作中に元の配置へ戻る
# 問題が発生した (「claude 稼働中にランダムで戻る」の正体)。latest は一時クライアントに
# 縮まないため unzoom しない。
# 注: resize-window は window-size を manual に落とし自動追従を無効化するため使わない
# (tmux(1): "automatically set window-size to manual")。
set -g window-size latest
# 既存 window に残った per-window window-size override (廃止した旧 resize-window -A 由来の
# manual 等) を config load 時に一掃し、全 window をグローバル window-size (latest) へ追従させる。
# 残留 manual があると client リサイズに自動追従せず表示領域が合わなくなる。unset 済みなら no-op。
# `##` は run-shell のフォーマット展開をエスケープし、内側 tmux に #{window_id} を渡すため。
run-shell 'for w in $(tmux list-windows -a -F "##{window_id}"); do tmux set-window-option -t "$w" -u window-size; done'
set -g aggressive-resize off  # Claude Code等のTUI再描画チラつき軽減 (default offを明示)
# 多数 pane 環境では history は pane 数だけ積算され tmux RSS を押し上げる
# (常駐が大きいと一部が swap に出され再描画でページフォルト→ラグ)。5000 で実用と省メモリを両立。
set -g history-limit 5000
set -g allow-passthrough on  # Kitty graphics protocol (image.nvim等で必要)
set -g extended-keys on      # CSI u: C-S-u等の修飾キーをNeovimに正しく送信
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Terminal title (for aerospace window detection)
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path}"

# --- Copy Mode (vi-style) ---
setw -g mode-keys vi
# (copy-mode keybindings are in custom-keys.conf)
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0

# Activity monitoring
setw -g monitor-activity on
set -g renumber-windows on

# Session lifecycle
# detach-on-destroy off: セッション閉鎖時に tmux クライアントを放り出さず、
# 別のセッションに自動切替する。sesh last / choose-tree ワークフロー成立に必須。
set -g detach-on-destroy off

# Status bar update interval (reduce for remote sessions)
set -g status-interval 30

# --- Terminal / Color (Ghostty + Neovim) ---
# default-terminal must NOT depend on $TERM at server-start time (rcon may
# launch tmux from a non-interactive ssh where TERM is empty, freezing "")
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# --- Keybindings (Vim-like) ---
# Pane navigation: vim-tmux-navigator (C-h/j/k/l) を使用
# (all custom keybindings are in custom-keys.conf)

# Window navigation
set -g repeat-time 1000  # リピート可能時間を1秒に

# Session navigation (see custom-keys.conf for keybindings)
# Session groups: 各 session の @group user option でグループ化 (名前規約に非依存)。
# state file 永続化・再適用は tmux-session-group.sh が担当。
# run-shell は -b 必須: display-menu は menu が閉じるまで CLI を返さないため、
# フォアグラウンド run-shell だと client のコマンドキューを保持してしまう。
# nav 系も -b でキュー保持を避ける (cb98ccd の fork レイテンシ対策と同方針)。
# '#{client_name}' 等の引数渡しも必須: run-shell -b の子プロセスは key を押した
# client/pane の文脈を持たない (tmux が任意の session/pane へ解決し誤動作する) ため、
# bind 時の format 展開で明示的に渡す。



# --- Popup Manager ---
# Project / git / DB tools: route through tmux-popup-in-container so they run
# inside the backing docker container for rcon-managed sessions (falls through
# to host execution for non-docker sessions, preserving in-docker tmux compat).
set -g @popup-lazygit   "g|80|80|~/dotfiles/scripts/tmux-popup-in-container lazygit"
set -g @popup-keifu     "k|80|80|~/dotfiles/scripts/tmux-popup-in-container zsh -lc keifu"
set -g @popup-pgcli     "P|80|80|~/dotfiles/scripts/tmux-popup-in-container pgcli \${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/postgres}"
set -g @popup-quay      "Q|80|80|~/dotfiles/scripts/tmux-popup-in-container quay"
set -g @popup-gh-dash   "G|85|85|~/dotfiles/scripts/tmux-popup-in-container gh dash|gh-dash"
set -g @popup-scratch   "j|80|80|SCRATCH|Scratchpad"
set -g @popup-sessions  "f|60|60|~/dotfiles/scripts/tmux-session-color.sh fzf-sessions"
set -g @popup-projects  "F|60|60|~/dotfiles/scripts/tmux-popup-ghq.sh"
set -g @popup-layout    "l|60|40|~/dotfiles/scripts/tmux-layout menu"
set -g @popup-smug      "N|60|50|~/dotfiles/scripts/tmux-smug-menu.sh|smug"
set -g @popup-manager-which-key-var "@wk_menu_popup"

# Theme: tokyonight | myproject
# Last selection is persisted in $XDG_STATE_HOME/tmux/current-theme by
# scripts/tmux-theme-toggle.sh. Fall back to tokyonight on first run.
run-shell 'state="${XDG_STATE_HOME:-$HOME/.local/state}/tmux/current-theme"; \
  theme=$( [ -f "$state" ] && cat "$state" || echo tokyonight ); \
  tmux source-file "$HOME/.config/tmux/${theme}.tmux"'

# (theme picker is in custom-keys.conf)

# Claude Code 通知統合
source-file ~/.config/tmux/claude-hooks.tmux

# Hook dispatch: tmux hook から直接複数 script を fork せず、イベントごとに1本へ集約する。
set-hook -g session-window-changed 'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh session-window-changed #{client_session} 2>/dev/null || true"'
set-hook -g client-session-changed 'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh client-session-changed #{client_session} 2>/dev/null || true"'
set-hook -gu session-created
set-hook -ga session-created 'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh session-created #{session_name} 2>/dev/null || true"'
set-hook -gu session-renamed
set-hook -ga session-renamed 'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh session-renamed #{session_name} 2>/dev/null || true"'
set-hook -gu client-attached
set-hook -ga client-attached 'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh client-attached #{session_name} 2>/dev/null || true"'
set-hook -gu after-new-window
set-hook -ga after-new-window 'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh after-new-window #{session_name} 2>/dev/null || true"'

# Pane-sticky zoom: register after-select-pane hook once (reload-safe via @zoom-hooks-loaded)
run-shell "~/dotfiles/scripts/tmux-zoom-hooks.sh"

# 現セッションに即時適用 (config reload & 既存セッション対応)
run-shell "~/dotfiles/scripts/tmux-session-color.sh apply '#{session_name}' 2>/dev/null || true"

# Session group 復元: server 起動 (config load) 時に state file から全 session へ @group を再適用
run-shell -b "~/dotfiles/scripts/tmux-session-group.sh restore 2>/dev/null || true"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# vim-tmux-navigator: extend pattern so C-h/j/k/l also pass through to:
#   - ssh sessions  (so rcon → remote tmux receives the keypress)
#   - nested tmux   (same purpose, when remote runs another tmux server)
# Without this, the outer tmux thinks "ssh process is not vim" and grabs
# the key for its own select-pane, never reaching the inner tmux.
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf|ssh|tmux)(diff)?(-wrapped)?'
# Override the default detection: match against tmux's own #{pane_current_command}
# instead of `ps -t $pane_tty`. Reason: `ps -t` enumerates EVERY process whose
# controlling tty equals the pane's pty — including backgrounded nvim, :term
# children, and zombies — and `+` (foreground-group flag) is unreliable when
# multiple process groups linger on the same tty (we've seen `Ss+ zsh` AND
# `S+ nvim` coexist, producing a false-positive regex match that stole C-h/j/k/l
# from pane navigation). tmux's `pane_current_command` is computed from the
# kernel's foreground-pgrp lookup on the pty and reflects what's actually on
# screen, so it gives the authoritative answer with no false positives.
set -g @vim_navigator_check "echo '#{pane_current_command}' | grep -iqE '^@vim_navigator_pattern$'"
set -g @plugin 'christoomey/vim-tmux-navigator'  # Neovim⇔tmux シームレス移動
set -g @plugin 'fcsonline/tmux-thumbs'            # Vimium-style hint text selection
set -g @plugin 'alexwforsythe/tmux-which-key'     # which-key popup menu
set -g @plugin 'eduwass/tmux-palette'              # Raycast-like command palette (popup launcher)
set -g @plugin 'cesarferreira/tmux.expose'         # Mission Control: 全 session を live thumbnail グリッドで俯瞰 (M-e)
set -g @tmux-expose-vim-keys 'on'                  # hjkl で grid 移動
# M-Space で起動 (no-prefix)。既定 C-Space は tmux prefix と衝突するため変更。
# popup ツールは ~/.config/tmux-palette/commands.json に集約 (popup-manager と併存)。
set -g @palette-key 'M-Space'

# Plugin settings
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'off'
# Resurrect long-lived supervisors across reboot. Leading "~" matches the process
# via extended regex against the full command line (with its original args), so
# the resurrected process restarts with the same --interval / --config flags.
# ralph-crew daemon: on resurrect, its own startup hook re-runs _run_init which
# rebuilds the crew-NN windows/panes against the new pane_ids.
set -g @resurrect-processes '"~ralph-crew daemon"'

# tmux-thumbs: Vimium-style hint selection (TPM binding disabled, using custom wrapper)
set -g @thumbs-key e  # custom wrapper overrides this binding later

# Initialize TPM (keep at the bottom)
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'

# tmux-which-key: link config from dotfiles (TPM doesn't preserve custom config)
if "test -f ~/.config/tmux/plugins/tmux-which-key/config.yaml && test -d ~/.tmux/plugins/tmux-which-key" \
   "run 'ln -sf ~/.config/tmux/plugins/tmux-which-key/config.yaml ~/.tmux/plugins/tmux-which-key/config.yaml'"

# Override plugins for prefix+C-h/C-l (window navigation)
# (moved to custom-keys.conf)

# tmux-popup-manager: load after TPM (overwrites which-key's empty @wk_menu_popup)
run-shell "~/.config/tmux/plugins/tmux-popup-manager/popup-manager.tmux"

# Force transparent background (Tmux 3.2+ requires both)
set -g status-bg default
set -g status-style bg=default

# Visual settings (pane borders, window styles) are set by the theme file

# サイドバー幅の即時補正: window-size latest 再適用後の比例リサイズ丸めで幅がドリフトするため、
# resize/session 切替の都度サイドバー pane を固定幅へ戻す (run ループの 3 秒補正の即時版)。
# -gu でリセットしてから append しないと prefix+r リロードの度に同じ run-shell が蓄積する。
# client-session-changed のサイドバー補正は上の hook dispatcher に集約済み。
set-hook -gu client-resized
set-hook -ga client-resized          'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh client-resized 2>/dev/null || true"'
# window-layout-changed: prefix+a の swap-pane 等でレイアウトが変わるとサイドバーが比例配分で
# 広がるため、変更のあった window のみ固定幅へ snap し直す (resize-all 側に再発火ループ防止ガードあり)。
set-hook -gu window-layout-changed
set-hook -ga window-layout-changed   'run-shell -b "~/dotfiles/scripts/tmux-hook-dispatch.sh window-layout-changed #{window_id} 2>/dev/null || true"'

# 既存サイドバー window の per-window hook を最新版へ張り直す (reload で全 window に反映)。
# per-window hook は toggle 時に焼き込まれるため、スクリプト更新だけでは既存 window に伝播しない。
run-shell -b "~/dotfiles/scripts/tmux-agent-sidebar.sh rehook 2>/dev/null || true"

# Layout presets are explicit only: prefix+A opens the tmux-layout menu.
# 自動適用 hook は pane focus / session switch の度に fork するため使わない。
