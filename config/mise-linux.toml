# Linux-only mise tool set.
#
# These tools were previously installed by the github_release / github_release_binary
# engine in scripts/linux.sh, which eval'd manifest data and scraped GitHub's
# /releases/latest with `grep -Po tag_name` unauthenticated. They are now installed
# by mise via the aqua / ubi backends (release resolution + platform asset selection
# handled by mise, no eval-on-data, no unauthenticated scrape).
#
# scripts/linux.sh copies this file to ~/.config/mise/conf.d/dotfiles-linux.toml at
# install time. conf.d is auto-loaded by mise. It is NOT stowed, so macOS (which
# installs these via Brewfile) never sees it — no cross-platform duplication.
#
# aqua backend: binary name is resolved from the aqua registry (e.g. bottom -> btm).
# github backend: aqua 未収録のツール。binary name は repo 名。archive リリースは
#                 [exe=NAME] で抽出名を上書き (rip2 -> rip, better-docker-ps -> dops)。
#                 (mise は ubi backend を deprecated とし github backend を推奨。2027.1 で ubi 削除)
# cargo backend:  raw-binary リリースで exe= が効かない tealdeer は Rust crate としてビルド
#                 (crate の bin 名 = tldr。install.sh では rust の post_install で cargo が PATH に乗る)。

[tools]
# --- aqua registry (25) ---
"aqua:junegunn/fzf" = "latest"
"aqua:fastfetch-cli/fastfetch" = "latest"
"aqua:dandavison/delta" = "latest"
"aqua:jesseduffield/lazygit" = "latest"
"aqua:x-motemen/ghq" = "latest"
"aqua:neovim/neovim" = "latest"
"aqua:chmln/sd" = "latest"
"aqua:bootandy/dust" = "latest"
"aqua:ClementTsang/bottom" = "latest"
"aqua:lsd-rs/lsd" = "latest"
"aqua:sxyazi/yazi" = "latest"
"aqua:casey/just" = "latest"
"aqua:watchexec/watchexec" = "latest"
"aqua:sharkdp/hyperfine" = "latest"
"aqua:gitleaks/gitleaks" = "latest"
"aqua:ducaale/xh" = "latest"
"aqua:charmbracelet/glow" = "latest"
"aqua:sachaos/viddy" = "latest"
"github:mr-karan/doggo" = "latest"  # aqua registry が doggo 1.2.0 の asset 命名に未追随のため github へ
"aqua:topgrade-rs/topgrade" = "latest"
"aqua:pemistahl/grex" = "latest"
"aqua:typst/typst" = "latest"
"aqua:direnv/direnv" = "latest"

# --- github backend (aqua 未収録の 7 tools) ---
"github:ivaaaan/smug" = "latest"
"github:MilesCranmer/rip2[exe=rip]" = "latest"
"github:ouch-org/ouch" = "latest"
"github:joshmedeski/sesh" = "latest"
"github:achristmascarl/rainfrog" = "latest"
"github:lemonade-command/lemonade" = "latest"
"github:Mikescher/better-docker-ps[exe=dops]" = "latest"

# --- cargo (tealdeer は raw-binary リリースで exe= が効かず tldr 名にできないため crate build) ---
"cargo:tealdeer" = "latest"
