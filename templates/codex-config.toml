# Legacy completion callback remains as a fallback for older Codex builds.
notify = ["__HOME__/dotfiles/scripts/tmux-claude-pane.sh", "set", "idle", "codex"]

# Codex 0.135+ stable lifecycle hooks.
[hooks]
SessionStart = [{ hooks = [{ type = "command", command = "__HOME__/dotfiles/scripts/tmux-claude-pane.sh set idle codex" }] }]
UserPromptSubmit = [{ hooks = [{ type = "command", command = "__HOME__/dotfiles/scripts/tmux-claude-pane.sh start codex event" }] }]
PreToolUse = [{ hooks = [{ type = "command", command = "__HOME__/dotfiles/scripts/tmux-claude-pane.sh heartbeat codex event" }] }]
PostToolUse = [{ hooks = [{ type = "command", command = "__HOME__/dotfiles/scripts/tmux-claude-pane.sh heartbeat codex event" }] }]
PermissionRequest = [{ hooks = [{ type = "command", command = "__HOME__/dotfiles/scripts/ai-notify.sh codex permission" }] }]
Stop = [{ hooks = [{ type = "command", command = "__HOME__/dotfiles/scripts/ai-notify.sh codex complete" }] }]
